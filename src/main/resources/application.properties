# LLM API Configuration (Adapt these for your chosen LLM, e.g., Gemini)
# Replace with the actual API endpoint you will be using
llm.api.base-url=https://router.huggingface.co/v1
llm.api.model=deepseek-ai/DeepSeek-V3.2-Exp
llm.api.key=${HF_API_KEY}
