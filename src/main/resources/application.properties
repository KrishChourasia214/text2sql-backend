spring.application.name=texttosqlchat
# Spring Boot Server Configuration
server.port=8080

# *** SQLite Database Configuration (Updated) ***
# URL: Points to a file named 'database.db' in the project root. It will be created if it doesn't exist.
spring.datasource.url=jdbc:sqlite:database.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA Configuration
# Set the dialect to the one provided by the hibernate-community-dialects dependency.
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

## H2 Database (In-Memory for simplicity)
